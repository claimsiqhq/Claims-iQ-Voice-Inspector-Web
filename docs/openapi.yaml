openapi: 3.0.3
info:
  title: Claims IQ Voice Inspector API
  description: |
    RESTful API for the Claims IQ Voice Inspector — a voice-driven property
    inspection platform for insurance adjusters. Supports claim management,
    document extraction, real-time voice inspections via OpenAI Realtime API,
    estimate generation with Xactimate-compatible pricing, and ESX/PDF export.
  version: 2.0.0
  contact:
    name: Claims IQ Engineering
  license:
    name: Proprietary

servers:
  - url: http://localhost:5000
    description: Local development
  - url: https://{replit-slug}.replit.app
    description: Replit deployment
    variables:
      replit-slug:
        default: Claims-iQ-Voice-Inspector

tags:
  - name: Health
  - name: Config
  - name: Auth
  - name: Profile
  - name: Settings
  - name: Claims
  - name: PolicyRules
  - name: TaxRules
  - name: Documents
  - name: Extractions
  - name: Briefing
  - name: Inspection
  - name: Workflow
  - name: Structures
  - name: Rooms
  - name: Openings
  - name: Adjacencies
  - name: Annotations
  - name: Damages
  - name: LineItems
  - name: SmartMacros
  - name: TestSquares
  - name: Scope
  - name: Photos
  - name: Moisture
  - name: Transcript
  - name: Completeness
  - name: Estimate
  - name: Export
  - name: Review
  - name: Supplemental
  - name: Realtime
  - name: Pricing
  - name: Flows
  - name: Gallery
  - name: PhotoLab
  - name: Notifications
  - name: Logs
  - name: Admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Local JWT or Supabase JWT token
  schemas:
    Error:
      type: object
      properties:
        message: { type: string }
      required: [message]

security:
  - bearerAuth: []

paths:
  # ════════════════════════════════════════════════════════
  #  HEALTH & CONFIG
  # ════════════════════════════════════════════════════════
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      security: []
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  timestamp: { type: string, format: date-time }
                  uptime: { type: number }
                  version: { type: string }

  /readiness:
    get:
      tags: [Health]
      summary: Readiness check (DB, storage, OpenAI)
      security: []
      responses:
        "200": { description: All subsystems ready }
        "503": { description: One or more subsystems not ready }

  /api/config:
    get:
      tags: [Config]
      summary: Get public client configuration
      security: []
      responses:
        "200":
          description: Supabase config for frontend
          content:
            application/json:
              schema:
                type: object
                properties:
                  supabaseUrl: { type: string }
                  supabaseAnonKey: { type: string }

  # ════════════════════════════════════════════════════════
  #  AUTH
  # ════════════════════════════════════════════════════════
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Local login with email/username and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emailOrUsername, password]
              properties:
                emailOrUsername: { type: string }
                password: { type: string }
      responses:
        "200": { description: JWT token and user profile }
        "401": { description: Invalid credentials }

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new local account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, minLength: 2 }
                password: { type: string, minLength: 6 }
                email: { type: string }
                fullName: { type: string }
      responses:
        "201": { description: Account created with JWT token }
        "400": { description: Validation error or duplicate }

  /api/auth/sync:
    post:
      tags: [Auth]
      summary: Sync Supabase user to local database
      responses:
        "200": { description: Synced user with JWT token }
        "403": { description: Token mismatch }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        "200": { description: Authenticated user profile }
        "401": { description: Not authenticated }

  # ════════════════════════════════════════════════════════
  #  PROFILE
  # ════════════════════════════════════════════════════════
  /api/profile:
    patch:
      tags: [Profile]
      summary: Update user profile (fullName, title, avatarUrl)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName: { type: string }
                title: { type: string }
                avatarUrl: { type: string, format: uri }
      responses:
        "200": { description: Updated profile }
        "400": { description: Validation error }

  /api/profile/avatar:
    post:
      tags: [Profile]
      summary: Upload avatar image (base64)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [base64Data, mimeType]
              properties:
                base64Data: { type: string }
                mimeType: { type: string, enum: [image/jpeg, image/png, image/webp] }
      responses:
        "200": { description: Updated profile with avatar URL }
        "413": { description: Avatar exceeds 5MB limit }

  # ════════════════════════════════════════════════════════
  #  SETTINGS
  # ════════════════════════════════════════════════════════
  /api/settings:
    get:
      tags: [Settings]
      summary: Get user settings
      responses:
        "200": { description: User settings object }
    put:
      tags: [Settings]
      summary: Update user settings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                voiceModel: { type: string }
                voiceSpeed: { type: number }
                assistantVerbosity: { type: string, enum: [concise, normal, detailed] }
                pushToTalk: { type: boolean }
                autoRecordOnRoomEntry: { type: boolean }
                silenceDetectionSensitivity: { type: string, enum: [low, medium, high] }
                defaultRegion: { type: string }
                defaultOverheadPercent: { type: number }
                defaultProfitPercent: { type: number }
                defaultTaxRate: { type: number }
                defaultWasteFactor: { type: number }
                measurementUnit: { type: string, enum: [imperial, metric] }
                autoGenerateBriefing: { type: boolean }
                requirePhotoVerification: { type: boolean }
                photoQuality: { type: string, enum: [low, medium, high] }
                autoAnalyzePhotos: { type: boolean }
                timestampWatermark: { type: boolean }
                gpsTagging: { type: boolean }
                companyName: { type: string }
                adjusterLicenseNumber: { type: string }
                includeTranscriptInExport: { type: boolean }
                includePhotosInExport: { type: boolean }
                exportFormat: { type: string, enum: [esx, pdf, both] }
                pushNotifications: { type: boolean }
                soundEffects: { type: boolean }
                claimStatusAlerts: { type: boolean }
                inspectionReminders: { type: boolean }
                theme: { type: string, enum: [light, dark, system] }
                compactMode: { type: boolean }
                fontSize: { type: string, enum: [small, medium, large] }
                showPhaseNumbers: { type: boolean }
      responses:
        "200": { description: Updated settings }
        "400": { description: Validation error }

  # ════════════════════════════════════════════════════════
  #  CLAIMS
  # ════════════════════════════════════════════════════════
  /api/claims:
    get:
      tags: [Claims]
      summary: List all claims (filtered by role)
      responses:
        "200": { description: Array of claims with inspection progress }
    post:
      tags: [Claims]
      summary: Create a new claim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [claimNumber]
              properties:
                claimNumber: { type: string, minLength: 1 }
                insuredName: { type: string }
                propertyAddress: { type: string }
                city: { type: string }
                state: { type: string }
                zip: { type: string }
                dateOfLoss: { type: string }
                perilType: { type: string }
                status: { type: string }
      responses:
        "201": { description: Claim created }
        "400": { description: Validation error }

  /api/claims/my-claims:
    get:
      tags: [Claims]
      summary: List claims assigned to current user
      responses:
        "200": { description: Array of user's claims with progress }

  /api/claims/purge-all:
    delete:
      tags: [Claims]
      summary: Delete all claims and related data (admin only)
      responses:
        "200": { description: Purge count }

  /api/claims/{id}:
    get:
      tags: [Claims]
      summary: Get claim with documents, extractions, briefing
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Claim with related data }
        "404": { description: Claim not found }
    patch:
      tags: [Claims]
      summary: Update claim fields or status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated claim }
    delete:
      tags: [Claims]
      summary: Delete claim and all related data
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Claim deleted }

  # ── Policy Rules ───────────────────────────────────────
  /api/claims/{claimId}/policy-rules:
    get:
      tags: [PolicyRules]
      summary: List policy rules for a claim
      parameters:
        - name: claimId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Array of policy rules }
    post:
      tags: [PolicyRules]
      summary: Create a policy rule for a claim
      parameters:
        - name: claimId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [coverageType]
              properties:
                coverageType: { type: string, enum: ["Coverage A", "Coverage B", "Coverage C", "Coverage D"] }
                policyLimit: { type: number }
                deductible: { type: number }
                applyRoofSchedule: { type: boolean }
                roofScheduleAge: { type: number }
                overheadPct: { type: number }
                profitPct: { type: number }
                taxRate: { type: number }
                opExcludedTrades: { type: array, items: { type: string } }
      responses:
        "201": { description: Policy rule created }

  /api/claims/{claimId}/policy-rules/{ruleId}:
    patch:
      tags: [PolicyRules]
      summary: Update a policy rule
      parameters:
        - name: claimId
          in: path
          required: true
          schema: { type: integer }
        - name: ruleId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated policy rule }
        "404": { description: Rule not found }

  # ── Tax Rules ──────────────────────────────────────────
  /api/claims/{claimId}/tax-rules:
    get:
      tags: [TaxRules]
      summary: List tax rules for a claim
      parameters:
        - name: claimId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Array of tax rules }
    post:
      tags: [TaxRules]
      summary: Create a tax rule
      parameters:
        - name: claimId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taxLabel, taxRate]
              properties:
                taxLabel: { type: string }
                taxRate: { type: number }
                appliesToCategories: { type: array, items: { type: string } }
                appliesToCostType: { type: string, enum: [material, labor, all] }
                isDefault: { type: boolean }
      responses:
        "201": { description: Tax rule created }

  /api/claims/{claimId}/tax-rules/{ruleId}:
    delete:
      tags: [TaxRules]
      summary: Delete a tax rule
      parameters:
        - name: claimId
          in: path
          required: true
          schema: { type: integer }
        - name: ruleId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Tax rule deleted }

  # ── Claim-scoped Documents ─────────────────────────────
  /api/claims/{id}/documents:
    get:
      tags: [Documents]
      summary: List documents for a claim
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Array of documents }

  /api/claims/{id}/documents/upload:
    post:
      tags: [Documents]
      summary: Upload a single PDF document
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, fileBase64, documentType]
              properties:
                fileName: { type: string }
                fileBase64: { type: string }
                documentType: { type: string, enum: [fnol, policy, endorsements] }
      responses:
        "201": { description: Document uploaded }
        "413": { description: File exceeds 25MB }

  /api/claims/{id}/documents/upload-batch:
    post:
      tags: [Documents]
      summary: Upload multiple PDF documents (endorsements)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [files, documentType]
              properties:
                files:
                  type: array
                  items:
                    type: object
                    properties:
                      fileName: { type: string }
                      fileBase64: { type: string }
                documentType: { type: string, enum: [endorsements] }
      responses:
        "201": { description: Batch uploaded }

  /api/claims/{id}/documents/{type}/parse:
    post:
      tags: [Documents]
      summary: Parse and extract data from an uploaded document
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: type
          in: path
          required: true
          schema: { type: string, enum: [fnol, policy, endorsements] }
      responses:
        "200": { description: Extraction result with confidence }
        "404": { description: Document not found }

  # ── Standalone Documents ───────────────────────────────
  /api/documents/all:
    get:
      tags: [Documents]
      summary: List all documents across claims
      responses:
        "200": { description: Array of documents }

  /api/documents/status-summary:
    get:
      tags: [Documents]
      summary: Get document processing status summary per claim
      responses:
        "200": { description: Array of claim document status summaries }

  /api/documents/{id}/signed-url:
    get:
      tags: [Documents]
      summary: Get signed download URL for a document
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Signed URL(s) }
        "404": { description: Document not found }

  # ── Extractions ────────────────────────────────────────
  /api/claims/{id}/extractions:
    get:
      tags: [Extractions]
      summary: List all extractions for a claim
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Array of extractions }

  /api/claims/{id}/extractions/{type}:
    get:
      tags: [Extractions]
      summary: Get extraction by document type
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: type
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Extraction data }
        "404": { description: Extraction not found }
    put:
      tags: [Extractions]
      summary: Update and confirm extraction data
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: type
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Updated extraction }

  /api/claims/{id}/extractions/{type}/confirm:
    post:
      tags: [Extractions]
      summary: Confirm an extraction without changes
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: type
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Confirmed }

  /api/claims/{id}/extractions/confirm-all:
    post:
      tags: [Extractions]
      summary: Confirm all extractions for a claim
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Confirmation count }

  # ── Briefing ───────────────────────────────────────────
  /api/claims/{id}/briefing:
    get:
      tags: [Briefing]
      summary: Get briefing for a claim
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Briefing data }
        "404": { description: Briefing not found }

  /api/claims/{id}/briefing/generate:
    post:
      tags: [Briefing]
      summary: Generate AI briefing from all extractions
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Generated briefing }
        "400": { description: Missing extractions }

  # ── Inspection Session Management (claim-scoped) ───────
  /api/claims/{id}/inspection/active:
    get:
      tags: [Inspection]
      summary: Get active inspection session for a claim
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Active session }
        "404": { description: No session found }

  /api/claims/{id}/inspection/start:
    post:
      tags: [Inspection]
      summary: Start or resume inspection session
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Existing session returned }
        "201": { description: New session created }

  /api/claims/{id}/weather-correlation:
    get:
      tags: [Claims]
      summary: Get weather correlation data for claim
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Weather correlation data }
        "503": { description: Weather API not configured }

  # ════════════════════════════════════════════════════════
  #  INSPECTION SESSION (session-scoped)
  # ════════════════════════════════════════════════════════
  /api/inspection/{sessionId}:
    get:
      tags: [Inspection]
      summary: Get session with rooms, line items, photos, estimate
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Full session data }
        "404": { description: Session not found }
    patch:
      tags: [Inspection]
      summary: Update session (phase, room, structure, status, notes)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated session }

  /api/inspection/{sessionId}/complete:
    post:
      tags: [Inspection]
      summary: Complete inspection session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Session completed }

  /api/inspection/{sessionId}/status:
    patch:
      tags: [Inspection]
      summary: Update session status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, review, exported, submitted, approved, completed] }
      responses:
        "200": { description: Updated session }

  # ── Workflow ───────────────────────────────────────────
  /api/inspection/{sessionId}/workflow:
    get:
      tags: [Workflow]
      summary: Get workflow state and allowed tools
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Workflow state }
        "404": { description: State not found }

  /api/inspection/{sessionId}/workflow/set-phase:
    post:
      tags: [Workflow]
      summary: Manually set workflow phase
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [phase]
              properties:
                phase: { type: string }
                stepId: { type: string }
      responses:
        "200": { description: Updated workflow state }

  /api/inspection/{sessionId}/workflow/set-context:
    post:
      tags: [Workflow]
      summary: Update workflow context data
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated workflow state }

  /api/inspection/{sessionId}/gates:
    get:
      tags: [Workflow]
      summary: Get stored gate results
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Gate results }

  /api/inspection/{sessionId}/gates/run:
    post:
      tags: [Workflow]
      summary: Run all workflow gates
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Gate results with next workflow state }

  /api/inspection/{sessionId}/validate-phase:
    get:
      tags: [Workflow]
      summary: Validate whether phase transition is allowed
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
        - name: phase
          in: query
          schema: { type: integer }
      responses:
        "200": { description: Phase validation result }

  # ── Timeline Events ────────────────────────────────────
  /api/inspection/{sessionId}/timeline:
    get:
      tags: [Inspection]
      summary: Get session timeline events
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
        - name: since
          in: query
          schema: { type: string }
      responses:
        "200": { description: Array of events }
    post:
      tags: [Inspection]
      summary: Record timeline events
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Events stored count }

  # ── Hierarchy ──────────────────────────────────────────
  /api/inspection/{sessionId}/hierarchy:
    get:
      tags: [Inspection]
      summary: Get full inspection hierarchy (structures → rooms → damages)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Hierarchical tree }

  # ── Structures ─────────────────────────────────────────
  /api/inspection/{sessionId}/structures:
    get:
      tags: [Structures]
      summary: List structures in session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Array of structures }
    post:
      tags: [Structures]
      summary: Create a structure
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                structureType: { type: string, default: dwelling }
      responses:
        "201": { description: Structure created }
        "200": { description: Existing structure returned (idempotent) }

  /api/inspection/{sessionId}/structures/{structureId}:
    patch:
      tags: [Structures]
      summary: Update a structure
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
        - name: structureId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated structure }
    delete:
      tags: [Structures]
      summary: Delete a structure
      parameters:
        - name: sessionId
