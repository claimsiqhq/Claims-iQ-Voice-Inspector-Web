                expectedPhotoType: { type: string }
      responses:
        "200": { description: Vision analysis with damage suggestions and line items }

  /api/inspection/{sessionId}/photos/{photoId}/annotations:
    put:
      tags: [Photos]
      summary: Save photo annotation shapes
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
        - name: photoId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shapes]
              properties:
                shapes: { type: array, items: { type: object } }
                annotatedImageBase64: { type: string }
      responses:
        "200": { description: Annotations saved }

  /api/inspection/{sessionId}/photos-grouped:
    get:
      tags: [Photos]
      summary: Get photos grouped by room
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Photos grouped by room name }

  # ── Moisture Readings ──────────────────────────────────
  /api/inspection/{sessionId}/moisture:
    get:
      tags: [Moisture]
      summary: List moisture readings (optionally filtered by roomId)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
        - name: roomId
          in: query
          schema: { type: integer }
      responses:
        "200": { description: Array of moisture readings }
    post:
      tags: [Moisture]
      summary: Record a moisture reading
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId, reading]
              properties:
                roomId: { type: integer }
                location: { type: string }
                reading: { type: number }
                materialType: { type: string }
                dryStandard: { type: number }
      responses:
        "201": { description: Moisture reading created }

  /api/inspection/{sessionId}/moisture/{id}:
    patch:
      tags: [Moisture]
      summary: Update a moisture reading
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated reading }
    delete:
      tags: [Moisture]
      summary: Delete a moisture reading
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Reading deleted }

  # ── Transcript ─────────────────────────────────────────
  /api/inspection/{sessionId}/transcript:
    get:
      tags: [Transcript]
      summary: Get voice inspection transcript
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Array of transcript entries }
    post:
      tags: [Transcript]
      summary: Add a transcript entry
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [speaker, content]
              properties:
                speaker: { type: string }
                content: { type: string }
      responses:
        "201": { description: Transcript entry added }

  # ── Completeness ───────────────────────────────────────
  /api/inspection/{sessionId}/completeness:
    get:
      tags: [Completeness]
      summary: Get inspection completeness score and checklist
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Completeness score, checklist, gaps }

  # ── Estimate Views ─────────────────────────────────────
  /api/inspection/{sessionId}/estimate-summary:
    get:
      tags: [Estimate]
      summary: Get estimate totals (RCV, depreciation, ACV)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Estimate summary }

  /api/inspection/{sessionId}/estimate-by-room:
    get:
      tags: [Estimate]
      summary: Get Xactimate-style estimate broken down by room
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Room-level estimate with depreciation }

  /api/inspection/{sessionId}/estimate-grouped:
    get:
      tags: [Estimate]
      summary: Get estimate grouped by category then room
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Category-grouped estimate }

  # ── Export ─────────────────────────────────────────────
  /api/inspection/{sessionId}/export/validate:
    post:
      tags: [Export]
      summary: Validate session readiness for export
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Export validation result }

  /api/inspection/{sessionId}/export/esx:
    post:
      tags: [Export]
      summary: Generate Xactimate ESX file
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ESX ZIP file
          content:
            application/zip:
              schema: { type: string, format: binary }

  /api/inspection/{sessionId}/export/pdf:
    post:
      tags: [Export]
      summary: Generate inspection report PDF
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: PDF report
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /api/inspection/{sessionId}/export/photo-report/pdf:
    post:
      tags: [Export]
      summary: Generate photo report PDF
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Photo report PDF
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /api/inspection/{sessionId}/export/photo-report/docx:
    post:
      tags: [Export]
      summary: Generate photo report DOCX
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Photo report DOCX
          content:
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema: { type: string, format: binary }

  # ── AI Review ──────────────────────────────────────────
  /api/inspection/{sessionId}/review/ai:
    post:
      tags: [Review]
      summary: Run AI estimate review
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: AI review results }

  # ── Session-level Supplemental ─────────────────────────
  /api/inspection/{sessionId}/supplemental:
    post:
      tags: [Supplemental]
      summary: Create a supplemental claim from session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
                newLineItems: { type: array, items: { type: object } }
                removedLineItemIds: { type: array, items: { type: integer } }
                modifiedLineItems: { type: array, items: { type: object } }
      responses:
        "200": { description: Supplemental created }

  /api/inspection/{sessionId}/supplementals:
    get:
      tags: [Supplemental]
      summary: List supplementals for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Array of supplementals }

  # ── Standalone Supplemental ────────────────────────────
  /api/supplemental/{id}:
    patch:
      tags: [Supplemental]
      summary: Update a supplemental claim
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated supplemental }

  /api/supplemental/{id}/submit:
    post:
      tags: [Supplemental]
      summary: Submit a supplemental claim
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Submitted supplemental }

  /api/supplemental/{id}/export/esx:
    post:
      tags: [Supplemental]
      summary: Export supplemental as ESX file
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Supplemental ESX ZIP
          content:
            application/zip:
              schema: { type: string, format: binary }

  # ════════════════════════════════════════════════════════
  #  REALTIME
  # ════════════════════════════════════════════════════════
  /api/realtime/session:
    post:
      tags: [Realtime]
      summary: Create OpenAI Realtime API session (returns ephemeral WebRTC secret)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [claimId]
              properties:
                claimId: { type: integer }
                sessionId: { type: integer }
                flowId: { type: integer }
      responses:
        "200": { description: Ephemeral client secret with session context }

  # ════════════════════════════════════════════════════════
  #  PRICING
  # ════════════════════════════════════════════════════════
  /api/pricing/catalog:
    get:
      tags: [Pricing]
      summary: Get full pricing catalog
      responses:
        "200": { description: Array of catalog items }

  /api/pricing/catalog/search:
    get:
      tags: [Pricing]
      summary: Search pricing catalog by code or description
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200": { description: Matching catalog items }
        "400": { description: Missing q parameter }

  /api/pricing/catalog/{tradeCode}:
    get:
      tags: [Pricing]
      summary: Get catalog items by trade code
      parameters:
        - name: tradeCode
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Items for trade }

  /api/pricing/scope:
    post:
      tags: [Pricing]
      summary: Price a set of scope items with regional pricing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      code: { type: string }
                      quantity: { type: number }
                      wasteFactor: { type: number }
                regionId: { type: string }
                taxRate: { type: number }
                overheadPercent: { type: number }
                profitPercent: { type: number }
      responses:
        "200": { description: Priced items with totals }

  /api/pricing/validate:
    post:
      tags: [Pricing]
      summary: Validate a set of estimate items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items: { type: array, items: { type: object } }
      responses:
        "200": { description: Validation results }

  /api/pricing/regions:
    get:
      tags: [Pricing]
      summary: Get available pricing regions
      responses:
        "200": { description: List of available regions }

  /api/pricing/seed:
    post:
      tags: [Pricing]
      summary: Seed pricing catalog (admin only)
      responses:
        "200": { description: Seed status }

  # ════════════════════════════════════════════════════════
  #  INSPECTION FLOWS
  # ════════════════════════════════════════════════════════
  /api/flows:
    get:
      tags: [Flows]
      summary: List inspection flows (optionally filtered by perilType)
      parameters:
        - name: perilType
          in: query
          schema: { type: string }
      responses:
        "200": { description: Array of inspection flows }
    post:
      tags: [Flows]
      summary: Create a custom inspection flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, perilType, steps]
              properties:
                name: { type: string }
                perilType: { type: string }
                description: { type: string }
                isDefault: { type: boolean }
                steps:
                  type: array
                  items:
                    type: object
                    required: [id, phaseName, agentPrompt, requiredTools, completionCriteria]
                    properties:
                      id: { type: string }
                      phaseName: { type: string }
                      agentPrompt: { type: string }
                      requiredTools: { type: array, items: { type: string } }
                      completionCriteria: { type: string }
      responses:
        "201": { description: Flow created }

  /api/flows/seed:
    post:
      tags: [Flows]
      summary: Seed default inspection flows (admin only)
      responses:
        "200": { description: Seed result }

  /api/flows/{id}:
    get:
      tags: [Flows]
      summary: Get an inspection flow by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Flow details }
        "404": { description: Flow not found }
    put:
      tags: [Flows]
      summary: Update an inspection flow
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Updated flow }
    delete:
      tags: [Flows]
      summary: Delete a custom inspection flow
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Flow deleted }

  /api/flows/{id}/clone:
    post:
      tags: [Flows]
      summary: Clone an inspection flow
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        "201": { description: Cloned flow }

  # ════════════════════════════════════════════════════════
  #  GALLERY
  # ════════════════════════════════════════════════════════
  /api/gallery/photos:
    get:
      tags: [Gallery]
      summary: Get all inspection photos grouped by claim
      responses:
        "200": { description: Claims with photos }

  /api/gallery/sketches:
    get:
      tags: [Gallery]
      summary: Get all sketches/structures grouped by claim
      responses:
        "200": { description: Claims with structures and rooms }

  # ════════════════════════════════════════════════════════
  #  PHOTO LAB
  # ════════════════════════════════════════════════════════
  /api/photolab/photos:
    get:
      tags: [PhotoLab]
      summary: List standalone photos for current user
      responses:
        "200": { description: Array of photos with signed URLs }

  /api/photolab/upload:
    post:
      tags: [PhotoLab]
      summary: Upload a standalone photo (auto-analyzed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageData, fileName]
              properties:
                imageData: { type: string }
                fileName: { type: string }
      responses:
        "200": { description: Photo uploaded with analysis pending }

  /api/photolab/photos/{id}/analyze:
    post:
      tags: [PhotoLab]
      summary: Re-analyze a standalone photo
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Analysis result }
        "404": { description: Photo not found }

  /api/photolab/photos/{id}/attach:
    patch:
      tags: [PhotoLab]
      summary: Attach a standalone photo to a claim
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [claimId]
              properties:
                claimId: { type: integer }
      responses:
        "200": { description: Photo attached }

  /api/photolab/photos/{id}/detach:
    patch:
      tags: [PhotoLab]
      summary: Detach a standalone photo from its claim
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Photo detached }

  /api/photolab/photos/{id}:
    delete:
      tags: [PhotoLab]
      summary: Delete a standalone photo
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Photo deleted }

  /api/photolab/photos/{id}/notes:
    patch:
      tags: [PhotoLab]
      summary: Update notes on a standalone photo
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string, nullable: true }
      responses:
        "200": { description: Notes updated }

  # ════════════════════════════════════════════════════════
  #  NOTIFICATIONS
  # ════════════════════════════════════════════════════════
  /api/notifications:
    get:
      tags: [Notifications]
      summary: Get notifications for current user
      responses:
        "200": { description: Array of notifications }

  # ════════════════════════════════════════════════════════
  #  LOGS
  # ════════════════════════════════════════════════════════
  /api/logs/voice-tool:
    post:
      tags: [Logs]
      summary: Log a voice tool call, result, or error
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                toolName: { type: string }
                type: { type: string, enum: [call, result, error] }
                data: { type: object }
      responses:
        "200": { description: Logged }

  # ════════════════════════════════════════════════════════
  #  ADMIN
  # ════════════════════════════════════════════════════════
  /api/admin/users:
    get:
      tags: [Admin]
      summary: List team members with active claim counts (supervisor/admin)
      responses:
        "200": { description: Array of team members }

  /api/admin/claims/assign:
    post:
      tags: [Admin]
      summary: Assign a claim to a user (supervisor/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [claimId, userId]
              properties:
                claimId: { type: integer }
                userId: { type: string }
      responses:
        "200": { description: Updated claim }

  /api/admin/dashboard:
    get:
      tags: [Admin]
      summary: Get dashboard statistics (supervisor/admin)
      responses:
        "200": { description: Dashboard stats }

  /api/admin/active-sessions:
    get:
      tags: [Admin]
      summary: List active inspection sessions (supervisor/admin)
      responses:
        "200": { description: Array of active sessions }
